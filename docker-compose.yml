services:

  # ── Anonymization proxy ──────────────────────────────────────────────────────
  proxy:
    build: .
    ports:
      - "8080:8080"
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:1.7b}
      DATABASE_PATH: /app/data/pii_vault.db
      ENGAGEMENT_ID: ${ENGAGEMENT_ID:-default}
      LLM_ENABLED: ${LLM_ENABLED:-true}
    volumes:
      - proxy_data:/app/data
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

  # ── Local LLM (Ollama) ────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  proxy_data:
  ollama_models:
