# Use this when Ollama is already running natively on your Mac (recommended for Apple Silicon).
# ollama run qwen3:1.7b    ← pull model first
# docker compose -f docker-compose.native-ollama.yml up

services:
  proxy:
    build: .
    ports:
      - "8080:8080"
    environment:
      # host.docker.internal resolves to the Mac host from inside Docker
      OLLAMA_HOST: http://host.docker.internal:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:1.7b}
      DATABASE_PATH: /app/data/pii_vault.db
      ENGAGEMENT_ID: ${ENGAGEMENT_ID:-default}
      LLM_ENABLED: ${LLM_ENABLED:-true}
    volumes:
      - proxy_data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  proxy_data:
